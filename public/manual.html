<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoEZ HTML — Manual</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --bg2: #1a1d27;
      --bg3: #23273a;
      --border: #2e3347;
      --text: #e2e5f0;
      --muted: #7c83a0;
      --accent: #4f8ef7;
      --accent2: #7c5ef7;
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      font-size: 15px;
    }

    /* ── Lang bar ── */
    .lang-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .lang-bar span {
      font-size: 11px;
      color: var(--muted);
      margin-right: 4px;
    }
    .lang-btn {
      background: none;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
      transition: background .15s;
      line-height: 1.8;
    }
    .lang-btn:hover { background: var(--bg3); }
    .lang-btn.active { border-color: var(--accent); background: rgba(79,142,247,.12); }

    /* ── Layout ── */
    .layout { display: flex; min-height: calc(100vh - 41px); }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      padding: 28px 0 40px;
      position: sticky;
      top: 41px;
      height: calc(100vh - 41px);
      overflow-y: auto;
    }
    .sidebar-logo {
      padding: 0 20px 24px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--accent);
    }
    .sidebar-logo span { color: var(--muted); font-weight: 400; text-transform: none; letter-spacing: 0; display: block; margin-top: 2px; font-size: 11px; }
    .nav-group { margin-bottom: 4px; }
    .nav-label {
      padding: 6px 20px 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
    }
    .nav-link {
      display: block;
      padding: 7px 20px;
      color: var(--text);
      text-decoration: none;
      font-size: 13.5px;
      border-left: 2px solid transparent;
      transition: background .15s, border-color .15s;
    }
    .nav-link:hover { background: var(--bg3); border-left-color: var(--accent); }

    /* ── Content ── */
    .content { flex: 1; min-width: 0; padding: 48px 56px 80px; max-width: 820px; }

    h1 { font-size: 30px; font-weight: 700; margin-bottom: 10px; }
    h1 .sub { font-size: 16px; color: var(--muted); font-weight: 400; margin-top: 6px; display: block; }
    h2 {
      font-size: 20px; font-weight: 700;
      margin: 52px 0 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      scroll-margin-top: 72px;
    }
    h3 { font-size: 15.5px; font-weight: 600; margin: 28px 0 10px; color: var(--accent); }
    p { margin-bottom: 12px; color: #c8ccdf; }
    ul, ol { padding-left: 20px; margin-bottom: 12px; color: #c8ccdf; }
    li { margin-bottom: 5px; }
    strong { color: var(--text); font-weight: 600; }
    code {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 13px;
      font-family: 'SF Mono', Consolas, monospace;
      color: #a5b4fc;
    }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, #1e2340 0%, #16192e 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-bottom: 40px;
    }
    .hero p { color: var(--muted); margin: 0; font-size: 14px; }

    /* ── Layout diagram ── */
    .layout-diagram {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin: 16px 0 24px;
    }
    .ld-header {
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      gap: 24px;
      align-items: center;
    }
    .ld-header b { color: var(--text); }
    .ld-body { display: flex; height: 130px; }
    .ld-left {
      width: 160px;
      flex-shrink: 0;
      background: #1a2035;
      border-right: 1px solid var(--border);
      padding: 12px;
      font-size: 11px;
      color: var(--muted);
    }
    .ld-left b { color: #818cf8; display: block; margin-bottom: 6px; font-size: 12px; }
    .ld-main { flex: 1; background: var(--bg2); padding: 12px 16px; font-size: 11px; color: var(--muted); }
    .ld-main b { color: #34d399; display: block; margin-bottom: 6px; font-size: 12px; }
    .ld-status {
      height: 28px;
      background: var(--bg3);
      border-top: 1px solid var(--border);
      padding: 0 16px;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
    }

    /* ── Step cards ── */
    .steps { display: flex; flex-direction: column; gap: 12px; margin: 16px 0 24px; }
    .step {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
    }
    .step-num {
      width: 28px; height: 28px; flex-shrink: 0;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff;
    }
    .step-body { font-size: 14px; color: #c8ccdf; line-height: 1.6; }
    .step-body strong { color: var(--text); }

    /* ── Feature cards ── */
    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0 24px; }
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }
    .card-icon { font-size: 20px; margin-bottom: 8px; }
    .card h4 { font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
    .card p { font-size: 13px; color: var(--muted); margin: 0; }

    /* ── Table ── */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0 24px;
      font-size: 13.5px;
    }
    th {
      background: var(--bg3);
      text-align: left;
      padding: 10px 14px;
      font-weight: 600;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .05em;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      color: #c8ccdf;
      vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }

    /* ── Badge ── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-blue  { background: #1e3a8a; color: #93c5fd; }
    .badge-green { background: #14532d; color: #86efac; }
    .badge-gray  { background: #374151; color: #d1d5db; }
    .badge-purple{ background: #4c1d95; color: #c4b5fd; }
    .badge-yellow{ background: #78350f; color: #fde68a; }
    .badge-red   { background: #7f1d1d; color: #fca5a5; }

    /* ── Shortcut ── */
    kbd {
      display: inline-block;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
      font-family: 'SF Mono', Consolas, monospace;
      color: var(--text);
      box-shadow: 0 1px 0 var(--border);
    }

    /* ── Note / Warning ── */
    .note {
      background: rgba(79,142,247,.08);
      border-left: 3px solid var(--accent);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 12px 16px;
      font-size: 13.5px;
      color: #c8ccdf;
      margin: 12px 0 20px;
    }
    .warn {
      background: rgba(251,191,36,.06);
      border-left: 3px solid var(--yellow);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 12px 16px;
      font-size: 13.5px;
      color: #c8ccdf;
      margin: 12px 0 20px;
    }

    /* ── Property group ── */
    .prop-group {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin: 12px 0 20px;
    }
    .prop-group-header {
      background: var(--bg3);
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      border-bottom: 1px solid var(--border);
    }
    .prop-row {
      display: flex;
      gap: 12px;
      padding: 9px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13.5px;
    }
    .prop-row:last-child { border-bottom: none; }
    .prop-name { width: 130px; flex-shrink: 0; color: var(--muted); font-size: 13px; }
    .prop-desc { color: #c8ccdf; }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .sidebar { display: none; }
      .content { padding: 32px 20px 60px; }
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Language switcher bar -->
<div class="lang-bar">
  <span id="lb-lang"></span>
  <button class="lang-btn" data-lang="en">🇺🇸 English</button>

  <!-- Sidebar -->
  <nav class="sidebar">

    <div class="nav-group">

    <div class="nav-group">
      <div class="nav-label" id="nav-g2"></div>

    </div>

    <div class="nav-group">
      <div class="nav-label" id="nav-g3"></div>
      <a class="nav-link" href="#class-apply" id="nav-class-apply"></a>
      <a class="nav-link" href="#undo"        id="nav-undo"></a>
      <a class="nav-link" href="#capture"     id="nav-capture"></a>
      <a class="nav-link" href="#save"        id="nav-save"></a>

    <div class="nav-group">
      <div class="nav-label" id="nav-g4"></div>

    </div>
  </nav>

  <!-- Main content -->
  <main class="content" id="main-content"></main>

</div>

<script>
const TRANSLATIONS = {
  en: {
    pageTitle: 'SoEZ HTML — Manual',
    langLabel: 'Language:',
    sbSubtitle: 'User Manual',
    navG1: 'Getting Started',
    navG2: 'Core Features',
    navG3: 'Advanced',
    navG4: 'Reference',
    navOverview: 'Overview',
    navQuickstart: 'Quick Start',
    navLayout: 'Screen Layout',
    navUpload: 'Open File',
    navSelect: 'Select Element',
    navEdit: 'Edit Properties',
    navViewmode: 'View Mode',
    navClassApply: 'Class Batch Apply',
    navUndo: 'Undo / Redo',

    navSave: 'Save',
    navElements: 'Element Types',
    navShortcuts: 'Shortcuts',
    content: `
      <h1>SoEZ HTML — User Manual<span class="sub">A visual HTML editing tool for non-developers</span></h1>
      <div class="hero">
        <p>SoEZ HTML lets you visually edit HTML files without knowing how to code. Click an element to select it, then adjust colors, sizes, and spacing in the left panel — changes are reflected in the preview instantly.</p>
      </div>

      <h2 id="overview">Overview</h2>
      <div class="cards">
        <div class="card"><div class="card-icon">🎯</div><h4>Visual Editing</h4><p>Click any element to instantly edit its properties in the panel.</p></div>
        <div class="card"><div class="card-icon">⚡</div><h4>Live Preview</h4><p>Changes are reflected instantly. Switch to Code view for direct HTML editing.</p></div>
        <div class="card"><div class="card-icon">↩️</div><h4>Undo / Redo</h4><p>Up to 50 steps of history so mistakes are easy to recover.</p></div>
        <div class="card"><div class="card-icon">📸</div><h4>Image Capture</h4><p>Auto-detect page sections and export as high-resolution images.</p></div>
      </div>

      <h2 id="quickstart">Quick Start</h2>
      <div class="steps">
        <div class="step"><div class="step-num">1</div><div class="step-body"><strong>Open File</strong> — Drag a <code>.html</code> file onto the upload area in the left panel, or click to browse.</div></div>
        <div class="step"><div class="step-num">2</div><div class="step-body"><strong>Select Element</strong> — Click the element you want to edit in the preview. Its properties appear in the left panel.</div></div>
        <div class="step"><div class="step-num">3</div><div class="step-body"><strong>Edit Properties</strong> — Adjust colors, sizes, text, etc. Changes are reflected in the preview immediately.</div></div>
        <div class="step"><div class="step-num">4</div><div class="step-body"><strong>Save</strong> — Click the <strong>Save</strong> button (<kbd>Ctrl</kbd>+<kbd>S</kbd>) to download the modified HTML file.</div></div>
      </div>

      <h2 id="layout">Screen Layout</h2>
      <div class="layout-diagram">
        <div class="ld-header"><span><b>Top Toolbar</b> — File name · Undo · Redo · Reset · Save · Language · Manual</span></div>
        <div class="ld-body">
          <div class="ld-left"><b>Left Panel (380px)</b>File Upload<br>Element Info<br>Property Editor<br>Image Capture</div>
          <div class="ld-main"><b>Right Panel (remaining area)</b>Preview / Code view toggle<br><br>HTML rendered preview<br>or Monaco code editor</div>
        </div>
        <div class="ld-status">Bottom status bar — shows DOM path of selected element (e.g. body &gt; div &gt; p)</div>
      </div>
      <table>
        <thead><tr><th>Area</th><th>Description</th></tr></thead>
        <tbody>
          <tr><td><strong>Top Toolbar</strong></td><td>File name, Undo/Redo, Reset to Original, Save, Language switcher, Manual</td></tr>
          <tr><td><strong>Left Panel</strong></td><td>File upload, selected element info, property editor, image capture</td></tr>
          <tr><td><strong>Right Panel</strong></td><td>Preview (default) or Code view</td></tr>
          <tr><td><strong>Status Bar</strong></td><td>DOM path of the currently selected element</td></tr>
        </tbody>
      </table>

      <h2 id="upload">Open File</h2>
      <p>Load a file through the upload area at the top of the left panel.</p>
      <ul>
        <li><strong>Drag &amp; Drop</strong> — Drag a <code>.html</code> or <code>.htm</code> file over the upload area.</li>
        <li><strong>Click to Browse</strong> — Click the upload area or the <strong>Change File</strong> button.</li>
        <li><strong>Paste</strong> — Copy a file to clipboard, then paste.</li>
      </ul>
      <div class="warn">Maximum file size is <strong>10MB</strong>. Loading a new file while one is already open will reset all edits.</div>

      <h2 id="select">Select Element</h2>
      <p>Click the element you want to edit in the preview. The selected element is highlighted and its details appear in the left panel.</p>
      <h3>Element Info Panel</h3>
      <div class="prop-group">
        <div class="prop-group-header">Displayed Info</div>
        <div class="prop-row"><div class="prop-name">Tag</div><div class="prop-desc">HTML tag of the selected element (e.g. <code>&lt;div&gt;</code>)</div></div>
        <div class="prop-row"><div class="prop-name">Type Badge</div><div class="prop-desc">One of: Text · Button · Box · Image · Line · N/A</div></div>
        <div class="prop-row"><div class="prop-name">ID</div><div class="prop-desc">The element's <code>id</code> attribute (shown in yellow)</div></div>
        <div class="prop-row"><div class="prop-name">Classes</div><div class="prop-desc">Applied CSS classes (shown in blue)</div></div>
      </div>
      <h3>Navigation Buttons</h3>
      <ul>
        <li><strong>▲ Up arrow</strong> — Move selection to parent element</li>
        <li><strong>▼ Down arrow</strong> — Move selection to first child element</li>
      </ul>

      <h2 id="edit">Edit Properties</h2>
      <p>Editable properties differ depending on the type of the selected element.</p>

      <h3>Text elements (<code>&lt;p&gt;</code>, <code>&lt;span&gt;</code>, <code>&lt;h1&gt;</code>, etc.)</h3>
      <div class="prop-group">
        <div class="prop-row"><div class="prop-name">Text Content</div><div class="prop-desc">Edit text directly</div></div>
        <div class="prop-row"><div class="prop-name">Font Size</div><div class="prop-desc">8 – 120px slider</div></div>
        <div class="prop-row"><div class="prop-name">Font</div><div class="prop-desc">Font family dropdown</div></div>
        <div class="prop-row"><div class="prop-name">Weight</div><div class="prop-desc">100 – 900 (Thin – Black)</div></div>
        <div class="prop-row"><div class="prop-name">Italic</div><div class="prop-desc">Toggle italic style</div></div>
        <div class="prop-row"><div class="prop-name">Color</div><div class="prop-desc">Color picker</div></div>
        <div class="prop-row"><div class="prop-name">Alignment</div><div class="prop-desc">Left / Center / Right / Justify</div></div>

        <div class="prop-row"><div class="prop-name">Border Radius</div><div class="prop-desc">0 – 100px</div></div>
        <div class="prop-row"><div class="prop-name">Border</div><div class="prop-desc">Width · Style · Color</div></div>
        <div class="prop-row"><div class="prop-name">Padding</div><div class="prop-desc">Top/Right/Bottom/Left individually</div></div>
        <div class="prop-row"><div class="prop-name">Font Size</div><div class="prop-desc">8 – 72px</div></div>

      <h2 id="viewmode">View Mode</h2>
      <p>Switch views using the <strong>Preview / Code</strong> buttons at the top of the right panel.</p>
      <table>
        <thead><tr><th>Mode</th><th>Description</th></tr></thead>

      <h2 id="class-apply">Class Batch Apply</h2>
      <p>Apply property changes to all elements sharing the same CSS class at once.</p>
      <div class="steps">
        <div class="step"><div class="step-num">1</div><div class="step-body">Select an element that has a class.</div></div>
        <div class="step"><div class="step-num">2</div><div class="step-body">Enable the <strong>"Apply to all same-class elements"</strong> checkbox in the left panel.</div></div>
        <div class="step"><div class="step-num">3</div><div class="step-body">Choose the class to edit from the dropdown.</div></div>
        <div class="step"><div class="step-num">4</div><div class="step-body">Change any property — it applies to <strong>all elements</strong> with that class simultaneously.</div></div>
      </div>

      <h2 id="undo">Undo / Redo</h2>
      <p>Navigate edit history via the toolbar or keyboard shortcuts. Up to <strong>50 steps</strong> are retained.</p>
      <table>
        <thead><tr><th>Button</th><th>Shortcut</th><th>Action</th></tr></thead>

          <tr><td><strong>Undo</strong></td><td><kbd>Ctrl</kbd>+<kbd>Z</kbd></td><td>Revert the last change.</td></tr>

          <tr><td><strong>Reset</strong></td><td>—</td><td>Fully revert to the state when the file was first opened.</td></tr>
        </tbody>
      </table>
      <div class="note">When undoing/redoing on a slide-deck HTML, the view automatically navigates to the slide that was edited.</div>

      <h2 id="capture">Image Capture</h2>
      <p>Split the page into sections and export as high-resolution images. Use the <strong>Capture</strong> area at the bottom of the left panel.</p>
      <div class="steps">
        <div class="step"><div class="step-num">1</div><div class="step-body">Choose <strong>Format</strong> (JPG / PNG) and <strong>Resolution</strong> (1x / 2x / 3x).</div></div>
        <div class="step"><div class="step-num">2</div><div class="step-body">Click <strong>Detect Sections</strong>. Page sections are detected automatically.</div></div>
        <div class="step"><div class="step-num">3</div><div class="step-body">Review the detected section list and heights. Click <strong>Reset</strong> and re-detect if needed.</div></div>
        <div class="step"><div class="step-num">4</div><div class="step-body">Click <strong>Capture</strong>. A progress bar appears and a ZIP file downloads when complete.</div></div>
      </div>
      <div class="warn">Capture only works in <strong>Preview mode</strong>. Switch from Code view first.</div>

      <h2 id="save">Save</h2>
      <p>Click the <strong>Save</strong> button or press <kbd>Ctrl</kbd>+<kbd>S</kbd> to download the modified HTML file to your computer.</p>
      <div class="warn"><strong>There is no auto-save.</strong> Save manually after important changes. Unsaved changes are lost if the browser tab is closed.</div>

      <h2 id="elements">Element Types Reference</h2>
      <table>
        <thead><tr><th>Type</th><th>Badge</th><th>Tags</th><th>Editable</th></tr></thead>
        <tbody>
          <tr><td>Text</td><td><span class="badge badge-blue">Text</span></td><td><code>&lt;p&gt;</code>, <code>&lt;span&gt;</code>, <code>&lt;h1–6&gt;</code>, <code>&lt;li&gt;</code>, etc.</td><td>✅</td></tr>
          <tr><td>Button</td><td><span class="badge badge-green">Button</span></td><td><code>&lt;button&gt;</code>, <code>&lt;a&gt;</code></td><td>✅</td></tr>
          <tr><td>Box</td><td><span class="badge badge-gray">Box</span></td><td><code>&lt;div&gt;</code>, <code>&lt;section&gt;</code>, <code>&lt;article&gt;</code>, etc.</td><td>✅</td></tr>
          <tr><td>Image</td><td><span class="badge badge-purple">Image</span></td><td><code>&lt;img&gt;</code></td><td>✅</td></tr>
          <tr><td>Line</td><td><span class="badge badge-yellow">Line</span></td><td><code>&lt;hr&gt;</code></td><td>✅</td></tr>
          <tr><td>N/A</td><td><span class="badge badge-red">N/A</span></td><td>Complex interactive elements</td><td>❌</td></tr>
        </tbody>
      </table>

      <h2 id="shortcuts">Keyboard Shortcuts</h2>
      <table>
        <thead><tr><th>Shortcut</th><th>Action</th></tr></thead>
        <tbody>
          <tr><td><kbd>Ctrl</kbd>+<kbd>Z</kbd> / <kbd>⌘</kbd>+<kbd>Z</kbd></td><td>Undo</td></tr>
          <tr><td><kbd>Ctrl</kbd>+<kbd>Y</kbd> / <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>Z</kbd></td><td>Redo</td></tr>
          <tr><td><kbd>Ctrl</kbd>+<kbd>S</kbd> / <kbd>⌘</kbd>+<kbd>S</kbd></td><td>Save HTML file</td></tr>
        </tbody>
      </table>
      <div class="note">When the Code view (Monaco editor) is focused, shortcuts act as editor-internal commands. Click outside the editor first.</div>
    `

    content: `
      <h1>SoEZ HTML 사용 설명서<span class="sub">비개발자를 위한 시각적 HTML 편집 도구</span></h1>
      <div class="hero">
        <p>SoEZ HTML은 코드를 몰라도 HTML 파일을 시각적으로 수정할 수 있는 도구입니다. 요소를 클릭하여 선택하고, 왼쪽 패널에서 색상·크기·여백 등을 조정하면 즉시 미리보기에 반영됩니다.</p>

      <h2 id="overview">개요</h2>
      <div class="cards">
        <div class="card"><div class="card-icon">🎯</div><h4>시각적 편집</h4><p>요소를 클릭하면 해당 속성을 패널에서 즉시 편집할 수 있습니다.</p></div>
        <div class="card"><div class="card-icon">⚡</div><h4>실시간 미리보기</h4><p>변경 사항이 바로 미리보기에 반영됩니다. 코드 뷰로 전환하여 직접 수정도 가능합니다.</p></div>
        <div class="card"><div class="card-icon">↩️</div><h4>실행 취소/다시 실행</h4><p>최대 50단계 이력 관리로 실수를 쉽게 되돌릴 수 있습니다.</p></div>
        <div class="card"><div class="card-icon">📸</div><h4>이미지 캡쳐</h4><p>페이지 섹션을 자동 감지하여 고해상도 이미지로 내보낼 수 있습니다.</p></div>
      </div>

      <h2 id="quickstart">빠른 시작</h2>
      <div class="steps">
        <div class="step"><div class="step-num">1</div><div class="step-body"><strong>파일 열기</strong> — 왼쪽 패널의 업로드 영역에 <code>.html</code> 파일을 드래그하거나 클릭하여 선택합니다.</div></div>
        <div class="step"><div class="step-num">2</div><div class="step-body"><strong>요소 선택</strong> — 미리보기에서 편집할 요소를 클릭합니다. 왼쪽 패널에 해당 속성이 표시됩니다.</div></div>
        <div class="step"><div class="step-num">3</div><div class="step-body"><strong>속성 편집</strong> — 색상, 크기, 텍스트 등 원하는 속성을 조정합니다. 변경 사항이 즉시 미리보기에 반영됩니다.</div></div>
        <div class="step"><div class="step-num">4</div><div class="step-body"><strong>저장</strong> — 상단 <strong>저장</strong> 버튼(<kbd>Ctrl</kbd>+<kbd>S</kbd>)을 클릭하여 수정된 HTML 파일을 다운로드합니다.</div></div>
      </div>

      <h2 id="layout">화면 구성</h2>
      <div class="layout-diagram">
        <div class="ld-header"><span><b>상단 툴바</b> — 파일명 · 실행 취소 · 다시 실행 · 원본 복원 · 저장 · 언어 · 매뉴얼</span></div>
        <div class="ld-body">
          <div class="ld-left"><b>왼쪽 패널 (380px)</b>파일 업로드<br>요소 정보<br>속성 편집<br>이미지 캡쳐</div>
          <div class="ld-main"><b>오른쪽 패널 (나머지 영역)</b>프리뷰 / 코드 뷰 전환<br><br>HTML 렌더링 미리보기<br>또는 Monaco 코드 에디터</div>

        <thead><tr><th>영역</th><th>설명</th></tr></thead>

          <tr><td><strong>왼쪽 패널</strong></td><td>파일 업로드, 선택된 요소 정보, 속성 편집기, 이미지 캡쳐</td></tr>

      </table>

      <h2 id="upload">파일 열기</h2>
      <p>왼쪽 패널 상단의 업로드 영역을 통해 파일을 불러옵니다.</p>
      <ul>

        <li><strong>붙여넣기</strong> — 파일을 클립보드에 복사한 뒤 붙여넣습니다.</li>

      <div class="warn">파일 크기는 최대 <strong>10MB</strong>입니다. 이미 파일이 열려 있을 때 새 파일을 불러오면 기존 편집 내용이 초기화됩니다.</div>

      <h2 id="select">요소 선택</h2>

        <div class="prop-row"><div class="prop-name">유형 뱃지</div><div class="prop-desc">텍스트 · 버튼 · 박스 · 이미지 · 선 · 미지원 중 하나</div></div>
        <div class="prop-row"><div class="prop-name">ID</div><div class="prop-desc">요소의 <code>id</code> 속성 (노란색으로 표시)</div></div>
        <div class="prop-row"><div class="prop-name">클래스</div><div class="prop-desc">적용된 CSS 클래스 목록 (파란색으로 표시)</div></div>
      </div>
      <h3>요소 탐색 버튼</h3>
      <ul>
        <li><strong>▲ 위쪽 화살표</strong> — 부모 요소로 선택 이동</li>
        <li><strong>▼ 아래쪽 화살표</strong> — 첫 번째 자식 요소로 선택 이동</li>

      <h2 id="edit">속성 편집</h2>
      <p>선택된 요소의 유형에 따라 편집 가능한 속성이 다르게 표시됩니다.</p>

      <h3>텍스트 요소 (<code>&lt;p&gt;</code>, <code>&lt;span&gt;</code>, <code>&lt;h1&gt;</code> 등)</h3>
      <div class="prop-group">
        <div class="prop-row"><div class="prop-name">텍스트 내용</div><div class="prop-desc">직접 텍스트를 입력하여 수정</div></div>
        <div class="prop-row"><div class="prop-name">글자 크기</div><div class="prop-desc">8 ~ 120px 슬라이더</div></div>

        <div class="prop-row"><div class="prop-name">굵기</div><div class="prop-desc">100 ~ 900 (Thin ~ Black)</div></div>
        <div class="prop-row"><div class="prop-name">이탤릭</div><div class="prop-desc">기울임 토글 버튼</div></div>

        <div class="prop-row"><div class="prop-name">둥글기</div><div class="prop-desc">0 ~ 100px</div></div>

        <div class="prop-row"><div class="prop-name">맞춤</div><div class="prop-desc">cover / contain / fill / none / scale-down</div></div>
      </div>

      <h3>선 요소 (<code>&lt;hr&gt;</code>)</h3>
      <div class="prop-group">
        <div class="prop-row"><div class="prop-name">선 색상</div><div class="prop-desc">컬러 피커</div></div>
        <div class="prop-row"><div class="prop-name">선 두께</div><div class="prop-desc">0 ~ 20px</div></div>

        <div class="prop-row"><div class="prop-name">너비</div><div class="prop-desc">0 ~ 100%</div></div>
      </div>

      <h2 id="viewmode">뷰 모드 전환</h2>

      <table>
        <thead><tr><th>모드</th><th>설명</th></tr></thead>
        <tbody>
          <tr><td><strong>프리뷰</strong></td><td>HTML이 렌더링된 실제 화면. 요소를 클릭하여 선택 및 편집. 슬라이드덱·인터랙티브 요소도 동작.</td></tr>

      <div class="note">프리뷰에서 요소를 선택한 뒤 코드 뷰로 전환하면 해당 요소가 있는 코드 라인으로 자동 스크롤되고 하이라이트됩니다.</div>

      <h2 id="class-apply">클래스 일괄 적용</h2>

      <div class="steps">
        <div class="step"><div class="step-num">1</div><div class="step-body">클래스가 있는 요소를 선택합니다.</div></div>

      <div class="warn">キャプチャは<strong>プレビューモード</strong>でのみ動作します。コードビューの場合は先にプレビューに切り替えてください。</div>

      <h2 id="save">保存</h2>

      <div class="warn"><strong>自動保存はありません。</strong>重要な変更後は手動で保存してください。ブラウザタブを閉じると未保存の変更が失われます。</div>

      <h2 id="elements">要素の種類</h2>

          <tr><td>ボックス</td><td><span class="badge badge-gray">ボックス</span></td><td><code>&lt;div&gt;</code>, <code>&lt;section&gt;</code>, <code>&lt;article&gt;</code> など</td><td>✅</td></tr>
          <tr><td>画像</td><td><span class="badge badge-purple">画像</span></td><td><code>&lt;img&gt;</code></td><td>✅</td></tr>
          <tr><td>区切り線</td><td><span class="badge badge-yellow">区切り線</span></td><td><code>&lt;hr&gt;</code></td><td>✅</td></tr>
          <tr><td>非対応</td><td><span class="badge badge-red">非対応</span></td><td>複雑なインタラクティブ要素</td><td>❌</td></tr>
        </tbody>
      </table>

      <h2 id="shortcuts">キーボードショートカット</h2>
      <table>
        <thead><tr><th>ショートカット</th><th>動作</th></tr></thead>
        <tbody>
          <tr><td><kbd>Ctrl</kbd>+<kbd>Z</kbd> / <kbd>⌘</kbd>+<kbd>Z</kbd></td><td>元に戻す</td></tr>
          <tr><td><kbd>Ctrl</kbd>+<kbd>Y</kbd> / <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>Z</kbd></td><td>やり直し</td></tr>
          <tr><td><kbd>Ctrl</kbd>+<kbd>S</kbd> / <kbd>⌘</kbd>+<kbd>S</kbd></td><td>HTMLファイルを保存</td></tr>

    content: `
      <h1>SoEZ HTML 使用手册<span class="sub">面向非开发者的可视化 HTML 编辑工具</span></h1>
      <div class="hero">
        <p>SoEZ HTML 让您无需了解代码即可对 HTML 文件进行可视化编辑。点击元素进行选择，在左侧面板中调整颜色、大小、间距等，修改结果即时反映在预览中。</p>
      </div>

      <h2 id="overview">概述</h2>
      <div class="cards">
        <div class="card"><div class="card-icon">🎯</div><h4>可视化编辑</h4><p>点击元素即可在面板中即时编辑其属性。</p></div>
        <div class="card"><div class="card-icon">⚡</div><h4>实时预览</h4><p>更改即时反映在预览中。也可切换到代码视图直接编辑。</p></div>
        <div class="card"><div class="card-icon">↩️</div><h4>撤销／重做</h4><p>最多保留 50 步操作历史，轻松撤销失误。</p></div>
        <div class="card"><div class="card-icon">📸</div><h4>图像截图</h4><p>自动检测页面区域，导出为高分辨率图像。</p></div>
      </div>

      <h2 id="quickstart">快速开始</h2>
      <div class="steps">
        <div class="step"><div class="step-num">1</div><div class="step-body"><strong>打开文件</strong> — 将 <code>.html</code> 文件拖拽到左侧面板的上传区域，或点击选择文件。</div></div>
        <div class="step"><div class="step-num">2</div><div class="step-body"><strong>选择元素</strong> — 在预览中点击要编辑的元素。左侧面板将显示其属性。</div></div>
        <div class="step"><div class="step-num">3</div><div class="step-body"><strong>编辑属性</strong> — 调整颜色、大小、文本等所需属性。更改即时反映在预览中。</div></div>
        <div class="step"><div class="step-num">4</div><div class="step-body"><strong>保存</strong> — 点击顶部<strong>保存</strong>按钮（<kbd>Ctrl</kbd>+<kbd>S</kbd>）下载修改后的 HTML 文件。</div></div>
      </div>

      <h2 id="layout">界面布局</h2>
      <div class="layout-diagram">
        <div class="ld-header"><span><b>顶部工具栏</b> — 文件名 · 撤销 · 重做 · 恢复原始 · 保存 · 语言 · 手册</span></div>
        <div class="ld-body">
          <div class="ld-left"><b>左侧面板 (380px)</b>文件上传<br>元素信息<br>属性编辑<br>图像截图</div>
          <div class="ld-main"><b>右侧面板 (剩余区域)</b>预览 / 代码视图切换<br><br>HTML 渲染预览<br>或 Monaco 代码编辑器</div>
        </div>
        <div class="ld-status">底部状态栏 — 显示所选元素的 DOM 路径（例如: body &gt; div &gt; p）</div>
      </div>
      <table>
        <thead><tr><th>区域</th><th>说明</th></tr></thead>
        <tbody>
          <tr><td><strong>顶部工具栏</strong></td><td>文件名显示、撤销/重做、恢复原始、保存、语言切换、手册</td></tr>
          <tr><td><strong>左侧面板</strong></td><td>文件上传、所选元素信息、属性编辑器、图像截图</td></tr>
          <tr><td><strong>右侧面板</strong></td><td>预览（默认）或代码视图可切换</td></tr>
          <tr><td><strong>状态栏</strong></td><td>显示当前所选元素的 DOM 路径</td></tr>
        </tbody>
      </table>

      <h2 id="upload">打开文件</h2>
      <p>通过左侧面板顶部的上传区域加载文件。</p>
      <ul>
        <li><strong>拖拽上传</strong> — 将 <code>.html</code>、<code>.htm</code> 文件拖拽到上传区域。</li>
        <li><strong>点击浏览</strong> — 点击上传区域或<strong>更改文件</strong>按钮。</li>
        <li><strong>粘贴</strong> — 将文件复制到剪贴板后粘贴。</li>
      </ul>
      <div class="warn">文件大小上限为 <strong>10MB</strong>。在已打开文件时加载新文件，将重置所有编辑内容。</div>

      <h2 id="select">选择元素</h2>
      <p>在预览中点击要编辑的元素。所选元素将高亮显示，左侧面板显示详细信息。</p>
      <h3>元素信息面板</h3>
      <div class="prop-group">
        <div class="prop-group-header">显示内容</div>

        <div class="prop-row"><div class="prop-name">类型标签</div><div class="prop-desc">文本 · 按钮 · 容器 · 图片 · 分隔线 · 不支持 之一</div></div>
        <div class="prop-row"><div class="prop-name">ID</div><div class="prop-desc">元素的 <code>id</code> 属性（以黄色显示）</div></div>
        <div class="prop-row"><div class="prop-name">类</div><div class="prop-desc">应用的 CSS 类列表（以蓝色显示）</div></div>
      </div>
      <h3>元素导航按钮</h3>
      <ul>
        <li><strong>▲ 向上箭头</strong> — 将选择移到父元素</li>
        <li><strong>▼ 向下箭头</strong> — 将选择移到第一个子元素</li>
      </ul>

      <h2 id="edit">编辑属性</h2>
      <p>可编辑的属性因所选元素的类型而异。</p>

      <h3>文本元素 (<code>&lt;p&gt;</code>, <code>&lt;span&gt;</code>, <code>&lt;h1&gt;</code> 等)</h3>
      <div class="prop-group">
        <div class="prop-row"><div class="prop-name">文本内容</div><div class="prop-desc">直接输入文本进行编辑</div></div>
        <div class="prop-row"><div class="prop-name">字体大小</div><div class="prop-desc">8〜120px 滑块</div></div>
        <div class="prop-row"><div class="prop-name">字体</div><div class="prop-desc">字体系列下拉选择</div></div>
        <div class="prop-row"><div class="prop-name">粗细</div><div class="prop-desc">100〜900（Thin〜Black）</div></div>
        <div class="prop-row"><div class="prop-name">斜体</div><div class="prop-desc">斜体切换按钮</div></div>
        <div class="prop-row"><div class="prop-name">字体颜色</div><div class="prop-desc">颜色选择器</div></div>
        <div class="prop-row"><div class="prop-name">对齐</div><div class="prop-desc">左对齐 / 居中 / 右对齐 / 两端对齐</div></div>
        <div class="prop-row"><div class="prop-name">行高</div><div class="prop-desc">0.5〜3x 滑块</div></div>
        <div class="prop-row"><div class="prop-name">字间距</div><div class="prop-desc">-5〜20px 滑块</div></div>
      </div>

      <h3>按钮元素 (<code>&lt;button&gt;</code>)</h3>
      <div class="prop-group">
        <div class="prop-row"><div class="prop-name">文本内容</div><div class="prop-desc">编辑按钮标签</div></div>
        <div class="prop-row"><div class="prop-name">背景色 / 字体颜色</div><div class="prop-desc">各颜色选择器</div></div>
        <div class="prop-row"><div class="prop-name">圆角</div><div class="prop-desc">0〜100px（border-radius）</div></div>
        <div class="prop-row"><div class="prop-name">边框</div><div class="prop-desc">宽度 · 样式 · 颜色</div></div>
        <div class="prop-row"><div class="prop-name">内边距</div><div class="prop-desc">上/右/下/左各自调整</div></div>
        <div class="prop-row"><div class="prop-name">字体大小</div><div class="prop-desc">8〜72px</div></div>
      </div>

      <h3>容器元素 (<code>&lt;div&gt;</code>, <code>&lt;section&gt;</code> 等)</h3>
      <div class="prop-group">
        <div class="prop-row"><div class="prop-name">背景色</div><div class="prop-desc">颜色选择器</div></div>
        <div class="prop-row"><div class="prop-name">背景图片</div><div class="prop-desc">直接输入图片 URL</div></div>
        <div class="prop-row"><div class="prop-name">边框</div><div class="prop-desc">宽度 · 样式 · 颜色</div></div>
        <div class="prop-row"><div class="prop-name">圆角</div><div class="prop-desc">0〜100px</div></div>
        <div class="prop-row"><div class="prop-name">内边距</div><div class="prop-desc">上/右/下/左</div></div>
        <div class="prop-row"><div class="prop-name">外边距</div><div class="prop-desc">上/右/下/左</div></div>
        <div class="prop-row"><div class="prop-name">阴影</div><div class="prop-desc">X · Y 偏移、模糊、扩散、颜色</div></div>
      </div>

      <h3>图片元素 (<code>&lt;img&gt;</code>)</h3>
      <div class="prop-group">
        <div class="prop-row"><div class="prop-name">图片文件</div><div class="prop-desc">通过文件选择按钮替换（以 Data URI 插入）</div></div>
        <div class="prop-row"><div class="prop-name">宽度 / 高度</div><div class="prop-desc">0〜2000px（含宽高比锁定切换）</div></div>
        <div class="prop-row"><div class="prop-name">圆角</div><div class="prop-desc">0〜100px</div></div>
        <div class="prop-row"><div class="prop-name">不透明度</div><div class="prop-desc">0〜1</div></div>

      <div class="prop-group">

      </div>

      <h2 id="viewmode">视图模式切换</h2>
      <p>通过右侧面板顶部的<strong>预览 / 代码</strong>按钮切换视图。</p>
      <table>
        <thead><tr><th>模式</th><th>说明</th></tr></thead>

          <tr><td><strong>预览</strong></td><td>实际渲染的 HTML 画面。点击元素进行选择和编辑。幻灯片和交互元素也可正常运行。</td></tr>
          <tr><td><strong>代码</strong></td><td>Monaco 代码编辑器（VS Code 风格）。HTML 语法高亮、自动补全。编辑代码后切换回预览时自动同步。</td></tr>

      <div class="note">在预览中选中元素后切换到代码视图，将自动滚动到该元素所在的代码行并高亮显示。</div>

      <h2 id="class-apply">批量应用类</h2>
      <p>将属性更改一次性应用到所有具有相同 CSS 类的元素。</p>
      <div class="steps">
        <div class="step"><div class="step-num">1</div><div class="step-body">选择一个具有类的元素。</div></div>
        <div class="step"><div class="step-num">2</div><div class="step-body">在左侧面板中勾选<strong>"应用到所有相同类的元素"</strong>复选框。</div></div>
        <div class="step"><div class="step-num">3</div><div class="step-body">从下拉菜单中选择要编辑的类。</div></div>
        <div class="step"><div class="step-num">4</div><div class="step-body">更改属性后，将同时应用到具有该类的<strong>所有元素</strong>。</div></div>

      <h2 id="undo">撤销 / 重做</h2>
      <p>通过顶部工具栏或键盘快捷键浏览编辑历史。最多保留 <strong>50 步</strong>历史记录。</p>
      <table>
        <thead><tr><th>按钮</th><th>快捷键</th><th>操作</th></tr></thead>
        <tbody>
          <tr><td><strong>撤销</strong></td><td><kbd>Ctrl</kbd>+<kbd>Z</kbd></td><td>撤销上一次更改。</td></tr>
          <tr><td><strong>重做</strong></td><td><kbd>Ctrl</kbd>+<kbd>Y</kbd> 或 <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>Z</kbd></td><td>重新应用已撤销的更改。</td></tr>
          <tr><td><strong>恢复原始</strong></td><td>—</td><td>完全恢复到最初打开文件时的状态。</td></tr>
        </tbody>
      </table>
      <div class="note">在幻灯片 HTML 中执行撤销/重做时，视图将自动跳转到被编辑的幻灯片页面。</div>

      <h2 id="capture">图像截图</h2>
      <p>将页面按区域拆分，导出为高分辨率图像。在左侧面板底部的<strong>截图</strong>区域中使用。</p>
      <div class="steps">
        <div class="step"><div class="step-num">1</div><div class="step-body">选择<strong>格式</strong>（JPG / PNG）和<strong>分辨率</strong>（1x / 2x / 3x）。</div></div>
        <div class="step"><div class="step-num">2</div><div class="step-body">点击<strong>检测区域</strong>按钮。页面区域将自动检测。</div></div>
        <div class="step"><div class="step-num">3</div><div class="step-body">查看检测到的区域列表和高度。如不满意，点击<strong>重置</strong>后重新检测。</div></div>
        <div class="step"><div class="step-num">4</div><div class="step-body">点击<strong>截图</strong>按钮。显示进度条，完成后下载 ZIP 文件。</div></div>

      <p>点击顶部<strong>保存</strong>按钮或按 <kbd>Ctrl</kbd>+<kbd>S</kbd>，将修改后的 HTML 文件下载到您的计算机。</p>
      <div class="warn"><strong>没有自动保存功能。</strong>重要更改后请手动保存。关闭浏览器标签页将丢失未保存的更改。</div>

      <h2 id="elements">元素类型参考</h2>
      <table>
        <thead><tr><th>类型</th><th>标签</th><th>对应标签</th><th>可编辑</th></tr></thead>
        <tbody>
          <tr><td>文本</td><td><span class="badge badge-blue">文本</span></td><td><code>&lt;p&gt;</code>, <code>&lt;span&gt;</code>, <code>&lt;h1〜6&gt;</code>, <code>&lt;li&gt;</code> 等</td><td>✅</td></tr>
          <tr><td>按钮</td><td><span class="badge badge-green">按钮</span></td><td><code>&lt;button&gt;</code>, <code>&lt;a&gt;</code></td><td>✅</td></tr>
          <tr><td>容器</td><td><span class="badge badge-gray">容器</span></td><td><code>&lt;div&gt;</code>, <code>&lt;section&gt;</code>, <code>&lt;article&gt;</code> 等</td><td>✅</td></tr>
          <tr><td>图片</td><td><span class="badge badge-purple">图片</span></td><td><code>&lt;img&gt;</code></td><td>✅</td></tr>
          <tr><td>分隔线</td><td><span class="badge badge-yellow">分隔线</span></td><td><code>&lt;hr&gt;</code></td><td>✅</td></tr>
          <tr><td>不支持</td><td><span class="badge badge-red">不支持</span></td><td>复杂交互元素</td><td>❌</td></tr>

      <h2 id="shortcuts">键盘快捷键</h2>
      <table>
        <thead><tr><th>快捷键</th><th>操作</th></tr></thead>
        <tbody>
          <tr><td><kbd>Ctrl</kbd>+<kbd>Z</kbd> / <kbd>⌘</kbd>+<kbd>Z</kbd></td><td>撤销</td></tr>
          <tr><td><kbd>Ctrl</kbd>+<kbd>Y</kbd> / <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>Z</kbd></td><td>重做</td></tr>
          <tr><td><kbd>Ctrl</kbd>+<kbd>S</kbd> / <kbd>⌘</kbd>+<kbd>S</kbd></td><td>保存 HTML 文件</td></tr>

    `
  }
};

(function() {
  const params = new URLSearchParams(location.search);
  let lang = params.get('lang') || 'en';
  if (!TRANSLATIONS[lang]) lang = 'en';

  function apply(l) {
    const T = TRANSLATIONS[l];
    document.documentElement.lang = l;
    document.title = T.pageTitle;

    document.getElementById('lb-lang').textContent = T.langLabel;
    document.getElementById('sb-subtitle').textContent = T.sbSubtitle;
    document.getElementById('nav-g1').textContent = T.navG1;
    document.getElementById('nav-g2').textContent = T.navG2;
    document.getElementById('nav-g3').textContent = T.navG3;
    document.getElementById('nav-g4').textContent = T.navG4;
    document.getElementById('nav-overview').textContent   = T.navOverview;
    document.getElementById('nav-quickstart').textContent = T.navQuickstart;
    document.getElementById('nav-layout').textContent     = T.navLayout;
    document.getElementById('nav-upload').textContent     = T.navUpload;
    document.getElementById('nav-select').textContent     = T.navSelect;
    document.getElementById('nav-edit').textContent       = T.navEdit;
    document.getElementById('nav-viewmode').textContent   = T.navViewmode;
    document.getElementById('nav-class-apply').textContent = T.navClassApply;
    document.getElementById('nav-undo').textContent       = T.navUndo;
    document.getElementById('nav-capture').textContent    = T.navCapture;
    document.getElementById('nav-save').textContent       = T.navSave;
    document.getElementById('nav-elements').textContent   = T.navElements;
    document.getElementById('nav-shortcuts').textContent  = T.navShortcuts;
    document.getElementById('main-content').innerHTML     = T.content;

    document.querySelectorAll('.lang-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.lang === l);
    });
  }

  apply(lang);

  document.querySelectorAll('.lang-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      const newLang = btn.dataset.lang;
      const url = new URL(location.href);
      url.searchParams.set('lang', newLang);
      history.replaceState(null, '', url.toString());
      apply(newLang);
    });
  });
})();
</script>
